name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create venv
        run: |
          uv python install 3.11
          uv venv --python 3.11

      - name: Install from git+https (depth=1 style)
        run: |
          source .venv/bin/activate
          GIT_CONFIG_COUNT=1 GIT_CONFIG_KEY_0=clone.depth GIT_CONFIG_VALUE_0=1 python -m pip install "git+https://github.com/${{ github.repository }}.git@${{ github.sha }}"

      - name: Run smoke tests
        run: |
          source .venv/bin/activate
          python tests/test_smoke.py
