name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create venv and install dependencies
        run: |
          uv python install 3.11
          uv venv --python 3.11
          uv pip install -e .

      - name: Run smoke tests
        run: uv run python tests/test_smoke.py
