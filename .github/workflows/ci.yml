name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create venv and install dependencies
        run: |
          uv python install 3.11
          uv venv --python 3.11
          uv pip install -e .

      - name: Run smoke tests
        run: uv run python tests/test_smoke.py

  pip-install:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install from git
        run: |
          python -m venv .venv
          .venv/bin/pip install git+https://github.com/${{ github.repository }}.git@${{ github.sha }}

      - name: Verify import
        run: |
          .venv/bin/python -c "from allen_mouse_connectivity import build_connectivity; print('✓ git install OK')"
